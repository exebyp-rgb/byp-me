<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>BYP — New Quote</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=JetBrains+Mono:wght@400;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07090d;
  --surface:#0b0e14;
  --card:#0f1419;
  --border:#18222e;
  --border2:#1f2e3d;
  --white:#edf2f7;
  --dim:#637585;
  --faint:#2b3a48;
  --gold:#f5a100;
  --gold-bg:rgba(245,161,0,.07);
  --green:#0bc270;
  --green-bg:rgba(11,194,112,.07);
  --red:#e8394a;
  --blue:#1e7fff;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}

/* ─── TOPBAR ─────────────────────────── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:48px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:rgba(7,9,13,.97);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px);
}
.topbar-logo{
  font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:900;
  color:var(--gold);letter-spacing:4px;text-transform:uppercase;text-decoration:none;
}
.topbar-out{
  background:none;border:1px solid var(--border2);color:var(--dim);
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  padding:5px 10px;border-radius:3px;cursor:pointer;transition:all .15s;
}
.topbar-out:hover{border-color:var(--red);color:var(--red);}

/* ─── SCREEN SYSTEM ──────────────────── */
.screen{
  display:none;min-height:100vh;padding:64px 16px 40px;
  max-width:540px;margin:0 auto;
}
.screen.active{display:block;}

/* ─── SCREEN: FORM ───────────────────── */
.screen-title{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:var(--dim);
  margin-bottom:28px;padding-top:8px;
  display:flex;align-items:center;gap:8px;
}
.screen-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* field label */
.lbl{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);
  display:block;margin-bottom:7px;
}

/* text inputs */
.inp{
  width:100%;background:var(--card);border:1px solid var(--border2);
  color:var(--white);padding:13px 14px;border-radius:4px;
  font-family:'Barlow',sans-serif;font-size:16px;font-weight:500;
  outline:none;transition:border-color .15s;
  -webkit-appearance:none;
}
.inp::placeholder{color:var(--faint);font-weight:400;}
.inp:focus{border-color:var(--blue);}
textarea.inp{resize:none;min-height:72px;line-height:1.5;}

.field{margin-bottom:20px;}

/* ─── LINE ITEMS ─────────────────────── */
.lines-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.lines-optional{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--faint);
}
.li-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.li-row{display:grid;grid-template-columns:1fr 110px 32px;gap:6px;align-items:center;}
.li-inp-d{
  background:var(--card);border:1px solid var(--border);color:var(--white);
  padding:10px 12px;border-radius:4px;font-family:'Barlow',sans-serif;
  font-size:14px;font-weight:500;outline:none;width:100%;
  transition:border-color .15s;-webkit-appearance:none;
}
.li-inp-d::placeholder{color:var(--faint);font-size:13px;}
.li-inp-d:focus{border-color:var(--blue);}
.li-inp-p{
  background:var(--card);border:1px solid var(--border);color:var(--gold);
  padding:10px 12px;border-radius:4px;font-family:'JetBrains Mono',monospace;
  font-size:15px;font-weight:700;outline:none;width:100%;text-align:right;
  transition:border-color .15s;-webkit-appearance:none;
}
.li-inp-p::placeholder{color:var(--faint);font-family:'Barlow',sans-serif;font-size:13px;font-weight:400;text-align:right;}
.li-inp-p:focus{border-color:var(--blue);}
.li-del{
  background:none;border:1px solid transparent;color:var(--faint);
  width:30px;height:38px;border-radius:3px;cursor:pointer;
  font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.li-del:hover{border-color:var(--red);color:var(--red);}
.add-line{
  width:100%;padding:10px;background:none;
  border:1px dashed var(--border2);color:var(--dim);
  border-radius:4px;cursor:pointer;
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  transition:all .15s;
}
.add-line:hover{border-color:var(--blue);color:var(--blue);}

/* ─── TOTAL BAR ──────────────────────── */
.total-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;margin:16px 0;
  background:var(--gold-bg);border:1px solid rgba(245,161,0,.18);border-radius:4px;
}
.total-label{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);
}
.total-value{
  font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:var(--gold);
}

/* ─── CREATE BUTTON ──────────────────── */
.btn-create{
  width:100%;padding:17px;border:none;border-radius:4px;
  background:var(--gold);color:#000;
  font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;
  text-transform:uppercase;letter-spacing:2.5px;cursor:pointer;
  transition:all .15s;position:relative;overflow:hidden;
}
.btn-create::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
  transform:translateX(-100%);transition:transform .35s;
}
.btn-create:hover::after{transform:translateX(100%);}
.btn-create:hover{background:#ffc040;transform:translateY(-1px);box-shadow:0 8px 28px rgba(245,161,0,.25);}
.btn-create:active{transform:translateY(0);}
.btn-create:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none;}

/* ─── RECENT JOBS ─────────────────────── */
.recent-section{margin-top:32px;padding-top:28px;border-top:1px solid var(--border);}
.recent-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--faint);
  margin-bottom:12px;
}
.recent-list{display:flex;flex-direction:column;gap:4px;}
.recent-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;background:var(--card);border:1px solid var(--border);
  border-radius:4px;cursor:pointer;transition:all .15s;text-align:left;
  width:100%;
}
.recent-item:hover{border-color:var(--border2);background:#141d27;}
.recent-item:hover .recent-arrow{color:var(--gold);}
.recent-icon{font-size:16px;flex-shrink:0;}
.recent-text{font-size:14px;font-weight:500;color:var(--white);flex:1;}
.recent-arrow{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--faint);transition:color .15s;}


/* ─── SCREEN: READY ──────────────────── */
.ready-screen{text-align:center;padding-top:80px;}
.ready-icon{font-size:52px;margin-bottom:16px;display:block;}
.ready-title{
  font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;
  text-transform:uppercase;letter-spacing:1px;color:var(--green);
  margin-bottom:6px;
}
.ready-sub{font-size:15px;color:var(--dim);margin-bottom:32px;}

.ready-link-box{
  background:var(--card);border:1px solid var(--border2);border-radius:6px;
  padding:20px;margin-bottom:24px;
}
.ready-link-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--faint);
  margin-bottom:10px;
}
.ready-url{
  font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;
  color:var(--white);background:var(--surface);border:1px solid var(--border);
  padding:12px 16px;border-radius:4px;letter-spacing:.5px;
  word-break:break-all;
}

.ready-btns{display:flex;flex-direction:column;gap:10px;}
.btn-share{
  width:100%;padding:16px;border:none;border-radius:4px;
  background:var(--gold);color:#000;
  font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;
  text-transform:uppercase;letter-spacing:2px;cursor:pointer;transition:all .15s;
}
.btn-share:hover{background:#ffc040;}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-secondary{
  padding:14px;background:none;border:1px solid var(--border2);
  color:var(--white);border-radius:4px;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;
  text-transform:uppercase;letter-spacing:1.5px;transition:all .15s;
}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue);}

/* copy feedback */
.copy-ok{
  display:none;font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--green);letter-spacing:1.5px;text-align:center;margin-top:6px;
}
.copy-ok.show{display:block;}

/* ─── CONTRACTOR MODAL ───────────────── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;
  display:none;align-items:flex-end;justify-content:center;padding:0;
}
.overlay.open{display:flex;}
.modal{
  background:var(--card);border:1px solid var(--border2);
  border-radius:12px 12px 0 0;
  padding:28px 20px 36px;
  width:100%;max-width:540px;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{
  width:36px;height:4px;background:var(--border2);border-radius:2px;
  margin:0 auto 24px;
}
.modal-pretitle{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--green);
  margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.modal-pretitle::before{
  content:'';width:5px;height:5px;border-radius:50%;
  background:var(--green);box-shadow:0 0 6px var(--green);
}
.modal-title{
  font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;
  text-transform:uppercase;color:var(--white);letter-spacing:.5px;
  margin-bottom:6px;
}
.modal-sub{font-size:14px;color:var(--dim);line-height:1.55;margin-bottom:22px;}
.modal-fields{display:flex;flex-direction:column;gap:12px;margin-bottom:18px;}
.btn-save{
  width:100%;padding:15px;border:none;border-radius:4px;
  background:var(--gold);color:#000;
  font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:900;
  text-transform:uppercase;letter-spacing:2px;cursor:pointer;transition:all .15s;
  margin-bottom:8px;
}
.btn-save:hover{background:#ffc040;}
.btn-modal-skip{
  width:100%;padding:10px;background:none;border:none;
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--faint);cursor:pointer;
  transition:color .15s;
}
.btn-modal-skip:hover{color:var(--dim);}

/* ─── SPINNER SPLASH ─────────────────── */
#splash{
  position:fixed;inset:0;background:var(--bg);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
}
.splash-logo{
  font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;
  color:var(--gold);letter-spacing:12px;text-transform:uppercase;
}
.splash-sub{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:var(--faint);
}
.splash-bar{width:100px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.splash-fill{height:100%;background:var(--gold);animation:ld 1.1s ease forwards;}
@keyframes ld{from{width:0}to{width:100%}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spinner{
  width:14px;height:14px;border:2px solid rgba(0,0,0,.25);
  border-top-color:#000;border-radius:50%;
  animation:spin .5s linear infinite;display:inline-block;
}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">BYP</div>
  <div class="splash-sub">Build Your Price</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <a href="index.html" class="topbar-logo">BYP</a>
  <button class="topbar-out" id="signoutBtn">Sign out</button>
</div>

<!-- ═══════════════════════════════
     SCREEN 1 — FORM
═══════════════════════════════ -->
<div class="screen" id="screenForm">

  <!-- Job description -->
  <div class="field">

  </div>

  <!-- Line items -->
  <div class="field">
    <div class="lines-header">

</div>


<!-- ═══════════════════════════════
     SCREEN 2 — READY
═══════════════════════════════ -->
<div class="screen" id="screenReady">
  <div class="ready-screen">
    <span class="ready-icon">✓</span>
    <div class="ready-title">Quote ready</div>
    <div class="ready-sub" id="readySub">Your quote link is live.</div>

    <div class="ready-link-box">
      <div class="ready-link-label">Quote link</div>
      <div class="ready-url" id="readyUrl">byp.me/q/0000</div>
    </div>

    <div class="ready-btns">
      <button class="btn-share" onclick="shareQuote()">⬆ Share</button>
      <div class="btn-row">
        <button class="btn-secondary" onclick="copyLink()">Copy link</button>
        <button class="btn-secondary" onclick="newQuote()">New quote</button>
      </div>
      <div class="copy-ok" id="copyOk">✓ Copied to clipboard</div>

  </div>
</div>


<!-- ═══════════════════════════════
     MODAL — CONTRACTOR DETAILS
═══════════════════════════════ -->

     FIREBASE + APP LOGIC

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

const cfg = {
  apiKey: "AIzaSyCKR0f8od3fWcl_FhPE9Pe9f1V8_bxcINc",
  authDomain: "byp-me.firebaseapp.com",
  projectId: "byp-me",
  storageBucket: "byp-me.firebasestorage.app",
  messagingSenderId: "479772888073",
  appId: "1:479772888073:web:825ff0aa4b4da1efac3cd8"
};

initializeApp(cfg);
const auth = getAuth();

onAuthStateChanged(auth, user => {
  document.getElementById('splash').style.display = 'none';
  if (!user) { window.location.href = 'byp-login.html'; return; }

  signOut(auth).then(() => window.location.href = 'byp-login.html');
</script>

<script>
// ── state ──
let lineCount = 0;
let currentQN  = null;

const RECENT_DEFAULTS = [
  { icon: '🔥', text: 'Water heater replacement', desc: 'Replace water heater and install new shutoff valve' },
  { icon: '⚡', text: 'Panel upgrade',             desc: '200A electrical panel upgrade' },
  { icon: '🔌', text: 'Install outlets',           desc: 'Install 3 new outlets in garage' },
  { icon: '🧱', text: 'Drywall repair',            desc: 'Patch and repaint drywall, approx 4×4 section' },
];

// ── boot ──
function initApp() {
  showScreen('screenForm');
  renderRecent();
  addLine(); // one empty line to start
}

// ── screens ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ── line items ──
function addLine(desc = '', price = '') {
  lineCount++;
  const id = lineCount;
  const row = document.createElement('div');
  row.className = 'li-row';
  row.id = 'li-' + id;
  row.innerHTML = `
    <input class="li-inp-d" type="text" placeholder="Work / materials…"
      value="${esc(desc)}" oninput="recalc()" autocomplete="off"/>
    <input class="li-inp-p" type="tel" inputmode="decimal" placeholder="$0"
      value="${price ? '$' + price : ''}"
      onfocus="clearDollar(this)" onblur="formatDollar(this)" oninput="recalc()"
      autocomplete="off"/>
    <button class="li-del" onclick="delLine(${id})" type="button">×</button>
  `;
  document.getElementById('liRows').appendChild(row);
  recalc();
}

function delLine(id) {
  const el = document.getElementById('li-' + id);
  if (el) el.remove();
  recalc();
}

function clearDollar(el) {
  el.value = el.value.replace(/[^0-9.]/g, '');
}
function formatDollar(el) {
  const n = parseFloat(el.value.replace(/[^0-9.]/g, ''));
  el.value = isNaN(n) || n === 0 ? '' : '$' + n.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:2});
  recalc();
}
function esc(s) { return String(s).replace(/"/g, '&quot;'); }

function recalc() {
  const total = getTotal();
  document.getElementById('totalDisplay').textContent =
    '$' + total.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:2});
}

function getTotal() {
  let t = 0;
  document.querySelectorAll('.li-inp-p').forEach(el => {
    const n = parseFloat(el.value.replace(/[^0-9.]/g, ''));
    if (!isNaN(n)) t += n;
  });
  return t;
}

function getLines() {
  const out = [];
  document.querySelectorAll('.li-row').forEach(row => {
    const desc  = row.querySelector('.li-inp-d').value.trim();
    const price = parseFloat(row.querySelector('.li-inp-p').value.replace(/[^0-9.]/g, ''));
    if (desc || (!isNaN(price) && price > 0)) {
      out.push({ desc, price: isNaN(price) ? 0 : price });
    }
  });
  return out;
}

// ── recent jobs ──
function renderRecent() {
  const saved = JSON.parse(localStorage.getItem('byp_recent') || '[]');
  const all = [...saved.slice(0, 3), ...RECENT_DEFAULTS].slice(0, 5);
  const list = document.getElementById('recentList');
  list.innerHTML = '';
  all.forEach((job, i) => {
    const btn = document.createElement('button');
    btn.className = 'recent-item';
    btn.innerHTML = `
      <span class="recent-icon">${job.icon || '🔧'}</span>
      <span class="recent-text">${job.text || job.desc || ''}</span>
      <span class="recent-arrow">→</span>
    `;
    btn.onclick = () => fillFromRecent(job);
    list.appendChild(btn);
  });
}

function fillFromRecent(job) {
  document.getElementById('jobDesc').value = job.desc || job.text || '';
  // clear lines and refill if saved
  document.getElementById('liRows').innerHTML = '';
  lineCount = 0;
  if (job.lines && job.lines.length) {
    job.lines.forEach(l => addLine(l.desc, l.price));
  } else {
    addLine();
  }
  recalc();
  window.scrollTo(0, 0);
  document.getElementById('jobDesc').focus();
}

function saveToRecent(desc, lines) {
  const saved = JSON.parse(localStorage.getItem('byp_recent') || '[]');
  const entry = {
    icon: '🔧',
    text: desc.slice(0, 50),
    desc,
    lines,
  };
  const filtered = saved.filter(j => j.text !== entry.text);
  filtered.unshift(entry);
  localStorage.setItem('byp_recent', JSON.stringify(filtered.slice(0, 5)));
}

// ── create quote ──
function createQuote() {
  const desc  = document.getElementById('jobDesc').value.trim();
  const lines = getLines();
  const total = getTotal();

  if (!desc && lines.length === 0) {
    document.getElementById('jobDesc').focus();
    document.getElementById('jobDesc').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('jobDesc').style.borderColor = '', 1200);
    return;
  }

  const qn = Math.floor(Math.random() * 90000) + 10000;
  currentQN = qn;

  // save to recent
  saveToRecent(desc, lines);

  // build & save quote data
  const contractor = JSON.parse(localStorage.getItem('byp_contractor') || '{}');
  const quoteData = { qn, desc, lines, total, contractor, ts: Date.now() };
  const all = JSON.parse(localStorage.getItem('byp_quotes') || '[]');
  all.unshift(quoteData);
  localStorage.setItem('byp_quotes', JSON.stringify(all.slice(0, 50)));

  // show ready screen
  const url = 'byp.me/q/' + qn;
  document.getElementById('readyUrl').textContent = url;
  document.getElementById('readySub').textContent =
    total > 0 ? 'Total: $' + total.toLocaleString('en-US') : 'Your quote link is live.';
  showScreen('screenReady');

  // ask for contractor details if not set
  if (!contractor.name) {
    setTimeout(() => document.getElementById('overlay').classList.add('open'), 800);
  }
}

// ── ready screen actions ──
function shareQuote() {
  const url = 'https://' + document.getElementById('readyUrl').textContent;
  const text = 'Here is your quote:\n' + url;
  if (navigator.share) {
    navigator.share({ title: 'Quote from BYP', text, url }).catch(() => {});
  } else {
    copyLink();
  }
}

function copyLink() {
  const url = 'https://' + document.getElementById('readyUrl').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const el = document.getElementById('copyOk');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const el = document.getElementById('copyOk');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  });
}

function newQuote() {
  document.getElementById('jobDesc').value = '';
  document.getElementById('liRows').innerHTML = '';
  lineCount = 0;
  addLine();
  recalc();
  renderRecent();
  showScreen('screenForm');
}

// ── contractor modal ──
function saveContractor() {
  const name  = document.getElementById('mName').value.trim();
  const phone = document.getElementById('mPhone').value.trim();
  if (!name) {
    document.getElementById('mName').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('mName').style.borderColor = '', 1200);
    return;
  }
  localStorage.setItem('byp_contractor', JSON.stringify({ name, phone }));
  document.getElementById('overlay').classList.remove('open');
}

function skipContractor() {
  document.getElementById('overlay').classList.remove('open');
}

// close modal on backdrop tap
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) skipContractor();
});

// expose to inline handlers
window.addLine        = addLine;
window.delLine        = delLine;
window.recalc         = recalc;
window.clearDollar    = clearDollar;
window.formatDollar   = formatDollar;
window.createQuote    = createQuote;
window.shareQuote     = shareQuote;
window.copyLink       = copyLink;
window.newQuote       = newQuote;
window.saveContractor = saveContractor;
window.skipContractor = skipContractor;
</script>
